<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINOLA — מוצא מתנות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F8F1EC;--surface:#fff;--ink:#3D2B26;--muted:#A78A7E;
  --accent:#B8755C;--accent-ink:#fff;--accent-soft:#E9C7B4;
  --chip-border:rgba(184,117,92,0.18);
  --chip-dark:#3D2B26;--chip-dark-ink:#F8F1EC;
  --progress-bg:rgba(184,117,92,0.15);
  --grad:linear-gradient(135deg,#C9876B 0%,#B8755C 50%,#9C5F47 100%);
  --r:22px;--serif:'Cormorant Garamond',serif;--sans:'Heebo',sans-serif;
}
html,body{min-height:100vh;font-family:var(--sans);background:#EDE2D9;}
body{display:flex;align-items:flex-start;justify-content:center;}
@media(min-width:600px){body{align-items:center;min-height:100vh;padding:24px 0;}}
.hidden{display:none!important;}

/* SHELL */
.shell{
  width:393px;max-width:100vw;background:var(--bg);
  display:flex;flex-direction:column;min-height:100vh;
  position:relative;overflow:hidden;
}
@media(min-width:600px){
  .shell{min-height:0;height:852px;border-radius:40px;overflow:hidden;
    box-shadow:0 24px 80px rgba(61,43,38,.22);}
}

/* STATUS BAR */
.status-bar{
  height:50px;flex-shrink:0;display:flex;align-items:center;
  justify-content:space-between;padding:12px 24px 0;background:var(--bg);
}
.status-time{font-family:var(--sans);font-size:15px;font-weight:600;color:var(--ink);}
.status-icons{display:flex;gap:6px;align-items:center;}

/* SCREENS */
.screen{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* ─── SPLASH ─── */
.splash{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:space-between;
  padding:24px 28px 36px;overflow-y:auto;
}
.splash-hero{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;padding-bottom:16px;
}
.splash-mark{display:block;margin:0 auto 18px;}
.splash-logo{
  font-family:var(--serif);font-weight:500;font-size:44px;
  color:var(--ink);letter-spacing:.32em;line-height:1;padding-right:.32em;
}
.ornament{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0 14px;}
.ornament-line{width:28px;height:1px;background:var(--accent);opacity:.6;}
.ornament-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);}
.splash-tagline{font-family:var(--sans);font-weight:300;font-size:13px;color:var(--muted);letter-spacing:.08em;}
.splash-card{
  background:var(--surface);border-radius:var(--r);padding:22px;
  margin-top:20px;width:100%;border:1px solid var(--chip-border);
  box-shadow:0 4px 32px rgba(184,117,92,.10);
}
.splash-card-title{
  font-family:var(--serif);font-weight:500;font-size:22px;
  color:var(--ink);margin-bottom:8px;line-height:1.25;
}
.splash-card-body{font-family:var(--sans);font-size:13px;color:var(--muted);line-height:1.7;font-weight:400;}
.splash-tags{display:flex;gap:8px;margin-top:14px;justify-content:center;flex-wrap:wrap;}
.splash-tag{
  font-family:var(--sans);font-size:11px;color:var(--accent);
  border:1px solid rgba(184,117,92,.3);border-radius:99px;padding:4px 12px;letter-spacing:.05em;
}
.btn-primary{
  width:100%;height:56px;border-radius:var(--r);border:none;
  background:var(--grad);color:var(--accent-ink);
  font-family:var(--serif);font-weight:500;font-size:18px;
  cursor:pointer;letter-spacing:.15em;flex-shrink:0;
  box-shadow:0 6px 24px rgba(184,117,92,.40);transition:opacity .18s;
}
.btn-primary:hover{opacity:.88;}
.btn-primary:active{opacity:.75;}
.back-link{
  display:inline-block;margin-top:14px;text-decoration:none;
  font-family:var(--sans);font-size:13px;color:var(--muted);
  letter-spacing:.04em;transition:color .18s;
}
.back-link:hover{color:var(--accent);}

/* ─── QUESTION ─── */
.q-header{padding:16px 20px 0;flex-shrink:0;}
.q-progress-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.q-back{
  background:none;border:none;cursor:pointer;
  font-family:var(--sans);font-size:13px;color:var(--muted);padding:0;
}
.q-counter{font-family:var(--sans);font-size:12px;color:var(--muted);font-weight:500;}
.q-bar-track{height:4px;background:var(--progress-bg);border-radius:99px;margin-bottom:20px;}
.q-bar-fill{height:100%;border-radius:99px;background:var(--accent);transition:width .4s ease;}
.q-title{
  font-family:var(--serif);font-weight:500;font-size:30px;
  color:var(--ink);line-height:1.15;margin-bottom:6px;
}
.q-sub{font-family:var(--sans);font-size:13px;color:var(--muted);font-weight:400;margin-bottom:18px;}
.q-opts{
  flex:1;overflow-y:auto;padding:0 20px 24px;
  display:flex;flex-direction:column;gap:10px;
}
.q-opt{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;border-radius:var(--r);
  border:1.5px solid var(--chip-border);background:var(--surface);
  cursor:pointer;transition:all .18s ease;text-align:right;width:100%;
  box-shadow:0 1px 4px rgba(0,0,0,.04);font-family:var(--sans);
}
.q-opt:hover{border-color:rgba(184,117,92,.45);background:#FAF2EC;}
.q-opt.active{
  border-color:var(--accent);background:var(--chip-dark);
  box-shadow:0 4px 16px rgba(184,117,92,.25);
}
.q-opt-text{flex:1;}
.q-opt-label{font-family:var(--sans);font-weight:400;font-size:15px;color:var(--ink);display:block;}
.q-opt.active .q-opt-label{color:var(--chip-dark-ink);font-weight:600;}
.q-opt-hint{font-family:var(--sans);font-size:12px;color:var(--muted);margin-top:2px;display:block;}
.q-opt.active .q-opt-hint{color:rgba(248,241,236,.55);}
.q-radio{
  width:20px;height:20px;border-radius:50%;flex-shrink:0;
  border:2px solid var(--chip-border);position:relative;
  display:flex;align-items:center;justify-content:center;
}
.q-opt.active .q-radio{border-color:#fff;background:#fff;}
.q-radio-inner{width:8px;height:8px;border-radius:50%;background:var(--chip-dark);display:none;}
.q-opt.active .q-radio-inner{display:block;}

/* ─── RESULTS ─── */
.results-top{padding:18px 20px 0;text-align:center;flex-shrink:0;}
.results-mark{display:block;margin:0 auto 10px;}
.results-title{
  font-family:var(--serif);font-weight:500;font-size:28px;
  color:var(--ink);line-height:1.2;letter-spacing:.02em;
}
.results-ornament{display:flex;align-items:center;justify-content:center;gap:10px;margin:8px 0 10px;}
.results-ornament-line{width:24px;height:1px;background:var(--accent);opacity:.5;}
.results-ornament-dot{width:4px;height:4px;border-radius:50%;background:var(--accent);}
.results-sub{font-family:var(--sans);font-size:13px;color:var(--muted);font-weight:400;}
.results-count{
  font-family:var(--sans);font-size:12px;color:var(--accent);
  font-weight:500;margin:6px 0 12px;min-height:18px;
}
.results-body{flex:1;overflow-y:auto;padding:0 16px 16px;}
.loading-inner{
  display:flex;align-items:center;justify-content:center;
  height:100%;padding:48px 0;
  font-family:var(--sans);font-size:13px;color:var(--muted);letter-spacing:.1em;
}
.empty-inner{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;text-align:center;padding:40px 20px;
}
.empty-title{font-family:var(--serif);font-size:24px;color:var(--ink);margin-bottom:10px;}
.empty-sub{font-family:var(--sans);font-size:14px;color:var(--muted);}

/* PRODUCT CARD */
.prod-list{display:flex;flex-direction:column;gap:12px;}
.prod-card{
  background:var(--surface);border-radius:var(--r);padding:14px;
  display:flex;gap:14px;align-items:flex-start;
  border:1.5px solid transparent;cursor:pointer;
  transition:border-color .18s,box-shadow .18s;
  box-shadow:0 1px 6px rgba(0,0,0,.05);
}
.prod-card.featured{
  border-color:rgba(184,117,92,.32);
  box-shadow:0 4px 24px rgba(184,117,92,.16);
}
.prod-card.picked{border-color:var(--accent);box-shadow:0 4px 20px rgba(184,117,92,.28);}
.prod-thumb{
  width:76px;height:76px;border-radius:14px;flex-shrink:0;
  overflow:hidden;background:rgba(167,138,126,.12);
}
.prod-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.prod-info{flex:1;min-width:0;}
.prod-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.prod-name{
  font-family:var(--serif);font-weight:500;font-size:17px;
  color:var(--ink);line-height:1.2;
}
.prod-badge{
  font-family:var(--sans);font-size:10px;font-weight:500;
  color:var(--accent);border:1px solid var(--accent);
  border-radius:99px;padding:2px 8px;flex-shrink:0;
  white-space:nowrap;letter-spacing:.05em;
}
.prod-cat{font-family:var(--sans);font-size:12px;color:var(--muted);margin-top:4px;line-height:1.4;}
.prod-hint{font-family:var(--sans);font-size:11px;color:rgba(184,117,92,.65);margin-top:5px;}
.prod-card.picked .prod-hint{color:var(--accent);font-weight:600;}

/* RESULTS CTA */
.results-cta{padding:12px 20px 32px;display:flex;flex-direction:column;gap:10px;flex-shrink:0;}
.btn-wa{
  display:flex;align-items:center;justify-content:center;gap:10px;
  height:54px;border-radius:var(--r);background:var(--grad);color:var(--accent-ink);
  font-family:var(--serif);font-weight:500;font-size:17px;text-decoration:none;
  box-shadow:0 6px 24px rgba(184,117,92,.42);letter-spacing:.1em;transition:opacity .18s;
}
.btn-wa:hover{opacity:.88;}
.btn-secondary{
  height:44px;border-radius:var(--r);border:1px solid var(--chip-border);
  background:transparent;color:var(--muted);font-family:var(--sans);
  font-size:13px;cursor:pointer;letter-spacing:.05em;transition:all .18s;
}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
</style>
<script src="products.js"></script>
</head>

<script>
// ── CONSTANTS ──
const WA = window.MINOLA_PHONE || '972502733773';

const QUESTIONS = [

    options: [
      { id: 'low',     label: 'עד ₪50',        hint: 'קטן ומחמם לב' },
      { id: 'mid',     label: '₪50 — 100',     hint: 'הכי פופולרי' },
      { id: 'high',    label: '₪100 — 150',    hint: 'מתנה משמעותית' },
      { id: 'premium', label: 'מעל ₪150',       hint: 'פרמיום' },
      { id: 'any',     label: 'לא משנה',         hint: 'תראו לי הכל' },
    ],
  },
];

const RECIPIENT_CATS = {
  baby:['ילדים'], kid:['ילדים'],
  teen:['ילדים','כוסות ובקבוקים','אירועים ומזכרות'],
  woman:['לבית','כוסות ובקבוקים','אהבה וזוגיות'],
  man:['כוסות ובקבוקים','לבית','מארזים'],
  boss:['כוסות ובקבוקים','מארזים','לבית'],
  teacher:['מורות וגננות','כוסות ובקבוקים'],
  family:['לבית','חגים','מארזים'],
  all:[],
};

const RECIPIENT_LABELS = {
  baby: 'תינוק', kid: 'ילד', teen: 'נוער', woman: 'אישה',
  man: 'גבר', boss: 'מנהל', teacher: 'מורה', family: 'משפחה', all: 'הכל',
};
const QUANTITY_LABELS = { one: 'יחידה אחת', few: '2–10', class: '20–35', bulk: '50+' };
const BUDGET_LABELS   = { low:'עד ₪50', mid:'₪50–100', high:'₪100–150', premium:'מעל ₪150', any:'לא משנה' };

// ── STATE ──
let qIndex = 0;
const answers = { recipient: null, quantity: null, budget: null };
let allItems = [];
const pickedIds = new Set();

// ── DOM ──
const screenSplash   = document.getElementById('screen-splash');
const screenQuestion = document.getElementById('screen-question');
const screenResults  = document.getElementById('screen-results');
const qCounter       = document.getElementById('qCounter');
const qBarFill       = document.getElementById('qBarFill');
const qTitle         = document.getElementById('qTitle');
const qSub           = document.getElementById('qSub');
const qOpts          = document.getElementById('qOpts');
const qBackBtn       = document.getElementById('qBackBtn');
const loadingEl      = document.getElementById('loadingEl');
const prodList       = document.getElementById('prodList');
const emptyEl        = document.getElementById('emptyEl');
const resultsCount   = document.getElementById('resultsCount');
const waBtn          = document.getElementById('waBtn');

// ── NAVIGATION ──
function showScreen(name) {
  screenSplash.classList.add('hidden');
  screenQuestion.classList.add('hidden');
  screenResults.classList.add('hidden');
  if (name === 'splash')   screenSplash.classList.remove('hidden');
  if (name === 'question') screenQuestion.classList.remove('hidden');
  if (name === 'results')  screenResults.classList.remove('hidden');
}

function showQuestion(idx) {
  qIndex = idx;
  const q = QUESTIONS[idx];
  qCounter.textContent = q.counter;
  qBarFill.style.width = q.progress + '%';
  qTitle.textContent = q.title;
  qSub.textContent = q.sub;
  qBackBtn.style.visibility = idx > 0 ? 'visible' : 'hidden';

  qOpts.innerHTML = '';
  for (const opt of q.options) {
    const btn = document.createElement('button');
    btn.className = 'q-opt' + (answers[q.key] === opt.id ? ' active' : '');
    btn.dataset.id = opt.id;
    btn.innerHTML =
      '<div class="q-opt-text">' +
        '<span class="q-opt-label">' + esc(opt.label) + '</span>' +
        (opt.hint ? '<span class="q-opt-hint">' + esc(opt.hint) + '</span>' : '') +
      '</div>' +
      '<div class="q-radio"><div class="q-radio-inner"></div></div>';
    btn.addEventListener('click', () => handleAnswer(q.key, opt.id, btn));
    qOpts.appendChild(btn);
  }
  showScreen('question');
  qOpts.scrollTop = 0;
}

function handleAnswer(key, value, clickedBtn) {
  if (qOpts.style.pointerEvents === 'none') return;
  qOpts.style.pointerEvents = 'none';
  answers[key] = value;
  qOpts.querySelectorAll('.q-opt').forEach(b => b.classList.remove('active'));
  clickedBtn.classList.add('active');
  setTimeout(() => {
    qOpts.style.pointerEvents = '';
    if (qIndex < QUESTIONS.length - 1) showQuestion(qIndex + 1);
    else loadResults();
  }, 220);
}

// ── EVENTS ──
document.getElementById('startBtn').addEventListener('click', () => showQuestion(0));
qBackBtn.addEventListener('click', () => {
  if (qIndex > 0) showQuestion(qIndex - 1);
  else showScreen('splash');
});
document.getElementById('resetBtn').addEventListener('click', restart);

function restart() {
  answers.recipient = answers.quantity = answers.budget = null;
  pickedIds.clear();
  showScreen('splash');
}

// ── RESULTS ──
async function loadResults() {
  showScreen('results');
  loadingEl.classList.remove('hidden');
  prodList.classList.add('hidden');
  emptyEl.classList.add('hidden');
  resultsCount.textContent = '';
  prodList.innerHTML = '';
  pickedIds.clear();
  updateWA();

  try {
    if (!allItems || !allItems.length) {
      allItems = window.MINOLA_ITEMS;
      if (!allItems || !allItems.length) {
        throw new Error('Catalog data is missing');
      }
    }
    renderResults();
  } catch(e) {
    loadingEl.classList.add('hidden');
    document.getElementById('emptyTitle').textContent = 'השרת לא זמין';
    document.getElementById('emptySub').textContent = 'יש להפעיל את שרת הקטלוג ולרענן את הדף';
    emptyEl.classList.remove('hidden');
  }
}

function renderResults() {
  const cats = RECIPIENT_CATS[answers.recipient] || [];
  function priceN(s){var m=String(s ?? '').match(/\d+/);return m?parseInt(m[0],10):null;}
  function inBudget(it){var b=answers.budget;if(!b||b==='any')return true;var n=priceN(it.price);if(n===null)return true;if(b==='low')return n<=50;if(b==='mid')return n>50&&n<=100;if(b==='high')return n>100&&n<=150;if(b==='premium')return n>150;return true;}
  const filtered = allItems.filter(item => {
    if (!item.showClient) return false;
    const catOk = !cats.length || cats.some(c => (item.tags||[]).includes(c));
    return catOk && inBudget(item);
  });
  filtered.sort((a, b) => (b.brandFeatured ? 1 : 0) - (a.brandFeatured ? 1 : 0));

  loadingEl.classList.add('hidden');
  resultsCount.textContent = filtered.length ? filtered.length + ' מוצרים מהקטלוג' : '';

  if (!filtered.length) { emptyEl.classList.remove('hidden'); return; }

  prodList.innerHTML = '';
  const shown = filtered.slice(0, 30);
  for (const item of shown) {
    const card = document.createElement('div');
    card.className = 'prod-card' + (item.brandFeatured ? ' featured' : '');
    card.dataset.id = item.id;
    const title = esc(item.title || item.productCategory || 'מתנה');
    const cat   = esc(item.productCategory || '');
    const thumb = esc(item.thumbnailUrl || '');
    card.innerHTML =
      '<div class="prod-thumb">' +
        '<img src="' + (thumb || window.MINOLA_LOGO) + '" alt="' + title + '" loading="lazy" onerror="this.onerror=null;this.src=window.MINOLA_LOGO">' +
      '</div>' +
      '<div class="prod-info">' +
        '<div class="prod-top">' +
          '<div class="prod-name">' + title + '</div>' +
          (item.brandFeatured ? '<span class="prod-badge">מומלץ</span>' : '') +
        '</div>' +
        '<div class="prod-cat">' + cat + '</div>' +
        '<div class="prod-hint">לחצי לסימון</div>' +
      '</div>';
    card.addEventListener('click', () => togglePick(item, card));
    prodList.appendChild(card);
  }
  prodList.classList.remove('hidden');
}

function togglePick(item, card) {
  const hint = card.querySelector('.prod-hint');
  if (pickedIds.has(item.id)) {
    pickedIds.delete(item.id);
    card.classList.remove('picked');
    hint.textContent = 'לחצי לסימון';
  } else {
    pickedIds.add(item.id);
    card.classList.add('picked');
    hint.textContent = '✓ סומן';
  }
  updateWA();
}

function updateWA() {
  const r = RECIPIENT_LABELS[answers.recipient] || '';
  const q = QUANTITY_LABELS[answers.quantity]   || '';
  const b = BUDGET_LABELS[answers.budget]        || '';
  const picked = allItems.filter(i => pickedIds.has(i.id));
  let msg = 'היי! אני מתעניינת במתנה ממיכלי 🎁\nלמי: ' + r + ' | כמות: ' + q + ' | תקציב: ' + b;
  if (picked.length) msg += '\n\nמוצרים שסימנתי:\n' + picked.map(i => '• ' + (i.title || i.productCategory)).join('\n');
  msg += '\nרוצה לשמוע עוד 😊';
  waBtn.href = 'https://wa.me/' + WA + '?text=' + encodeURIComponent(msg);
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
